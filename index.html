<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NBA Guess Player</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #121826;
      --muted: #5e6677;
      --line: #d9deea;
      --paper: #f6f7fb;
      --panel: #ffffff;
      --nba-blue: #17408b;
      --nba-red: #c9082a;
      --good: #16794a;
      --close: #d18a00;
      --bad: #9b2335;
      --soft-blue: #eaf0ff;
      --shadow: 0 18px 50px rgba(18, 24, 38, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(23, 64, 139, .1), rgba(201, 8, 42, .08) 44%, rgba(10, 132, 132, .1)),
        var(--paper);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--nba-blue), var(--nba-red));
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 10px 24px rgba(23, 64, 139, .24);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.7rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: .96rem;
    }

    .source {
      text-align: right;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 18px;
      align-items: start;
    }

    .game,
    .side {
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(217, 222, 234, .88);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .stat {
      padding: 15px 16px;
      border-right: 1px solid var(--line);
      min-width: 0;
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat b {
      display: block;
      font-size: 1.22rem;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      padding: 16px;
      background: linear-gradient(180deg, #fff, #f9fbff);
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 5;
    }

    .searchbox {
      position: relative;
      min-width: 0;
    }

    .searchbox input {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd3e4;
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .searchbox input:focus {
      border-color: var(--nba-blue);
      box-shadow: 0 0 0 4px rgba(23, 64, 139, .12);
    }

    .suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 7px);
      max-height: 310px;
      overflow-y: auto;
      border: 1px solid #cbd3e4;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 36px rgba(18, 24, 38, .18);
      z-index: 20;
    }

    .suggestions[hidden] {
      display: none;
    }

    .suggestion {
      width: 100%;
      min-height: 54px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      border-bottom: 1px solid #edf0f6;
    }

    .suggestion:last-child {
      border-bottom: 0;
    }

    .suggestion:hover,
    .suggestion.active {
      background: var(--soft-blue);
    }

    .suggestion strong {
      display: block;
      font-size: .98rem;
      line-height: 1.15;
    }

    .suggestion span {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    .primary,
    .secondary,
    .icon-btn {
      height: 48px;
      border-radius: 8px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      white-space: nowrap;
    }

    .primary {
      background: var(--nba-blue);
      color: #fff;
    }

    .secondary {
      background: #f0f3fa;
      color: var(--ink);
      border: 1px solid #d7deeb;
    }

    .primary:disabled,
    .secondary:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .message {
      min-height: 38px;
      padding: 0 16px 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .94rem;
    }

    .message strong {
      color: var(--ink);
    }

    .board-wrap {
      overflow-x: auto;
      background: #fff;
      position: relative;
      z-index: 1;
    }

    .board {
      min-width: 760px;
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .board th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f6f8fd;
      color: #394254;
      font-size: .76rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    .board td {
      padding: 9px 8px;
      border-bottom: 1px solid #edf0f6;
      vertical-align: middle;
    }

    .guess-row {
      animation: rowIn .18s ease-out;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .player-cell {
      width: 184px;
      font-weight: 800;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini {
      display: inline;
      margin-left: 8px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .tile {
      min-height: 46px;
      border-radius: 8px;
      padding: 7px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      font-weight: 850;
      font-size: .92rem;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .green {
      background: var(--good);
    }

    .yellow {
      background: var(--close);
    }

    .red {
      background: var(--bad);
    }

    .empty {
      height: 260px;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    .empty b {
      display: block;
      color: var(--ink);
      font-size: 1.2rem;
      margin-bottom: 6px;
    }

    .side {
      padding: 16px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
      padding: 4px;
      border-radius: 8px;
      background: #eef2f8;
    }

    .mode-tabs button {
      height: 40px;
      border-radius: 7px;
      background: transparent;
      color: #4c5568;
      font-weight: 850;
    }

    .mode-tabs button.active {
      background: #fff;
      color: var(--nba-blue);
      box-shadow: 0 4px 12px rgba(18, 24, 38, .08);
    }

    .panel-title {
      margin: 12px 0 8px;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .answer-card {
      min-height: 250px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .portrait {
      height: 168px;
      background:
        radial-gradient(circle at 70% 15%, rgba(201, 8, 42, .24), transparent 32%),
        linear-gradient(135deg, rgba(23, 64, 139, .18), rgba(10, 132, 132, .16));
      display: grid;
      place-items: end center;
      overflow: hidden;
    }

    .portrait img {
      max-height: 180px;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 14px 20px rgba(18, 24, 38, .22));
    }

    .portrait.hard-clue img {
      filter: brightness(0) contrast(1.65) drop-shadow(0 14px 20px rgba(18, 24, 38, .25));
      opacity: .95;
      transform: translateY(10px);
    }

    .silhouette {
      width: 118px;
      height: 146px;
      border-radius: 58px 58px 16px 16px;
      background: linear-gradient(180deg, #263247, #141b29);
      opacity: .92;
      transform: translateY(12px);
    }

    .answer-body {
      padding: 13px 14px 15px;
    }

    .answer-body h2 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .answer-body p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.35;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .quick-grid[hidden],
    .legend-block[hidden] {
      display: none;
    }

    .quick {
      border: 1px solid #dfe5f0;
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
    }

    .quick b {
      display: block;
      font-size: 1.05rem;
      line-height: 1.1;
    }

    .quick span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .74rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .legend div {
      min-height: 42px;
      border-radius: 8px;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: .78rem;
      font-weight: 850;
      text-align: center;
      padding: 6px;
    }

    .actions {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .actions .secondary {
      width: 100%;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #101827;
      color: #fff;
      padding: 11px 14px;
      border-radius: 8px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, .24);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 30;
      max-width: min(460px, calc(100vw - 24px));
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(18, 24, 38, .38);
      z-index: 40;
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal {
      width: min(360px, 100%);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .7);
      background: #fff;
      box-shadow: 0 24px 70px rgba(18, 24, 38, .28);
      padding: 20px;
      text-align: center;
    }

    .modal h2 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: 0;
    }

    .modal p {
      margin: 8px 0 16px;
      color: var(--muted);
      line-height: 1.45;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .board.hard-board {
      min-width: 360px;
    }

    .hard-guess-cell {
      width: 100%;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .source {
        text-align: left;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100vw - 18px, 1180px);
        padding-top: 12px;
      }

      .mark {
        width: 40px;
        height: 40px;
      }

      .status-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat:nth-child(2) {
        border-right: 0;
      }

      .stat:nth-child(-n+2) {
        border-bottom: 1px solid var(--line);
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .primary,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">NBA</div>
        <div>
          <h1>Guess Player</h1>
          <div class="sub">无限 NBA 球员猜谜</div>
        </div>
      </div>
      <div class="source" id="sourceLabel">数据载入中...</div>
    </header>

    <section class="layout">
      <div class="game">
        <div class="status-strip" aria-live="polite">
          <div class="stat"><b id="attemptStat">0</b><span>Guesses</span></div>
          <div class="stat"><b id="modeStat">#1</b><span>Round</span></div>
          <div class="stat"><b id="poolStat">0</b><span>Players</span></div>
          <div class="stat"><b id="resultStat">Ready</b><span>Status</span></div>
        </div>

        <form class="controls" id="guessForm" autocomplete="off">
          <div class="searchbox">
            <input id="guessInput" placeholder="输入 NBA 球员名" aria-label="输入 NBA 球员名" aria-controls="suggestions" aria-expanded="false">
            <div class="suggestions" id="suggestions" role="listbox" hidden></div>
          </div>
          <button class="primary" type="submit" id="guessButton">猜</button>
          <button class="secondary" type="button" id="clearButton">清空</button>
        </form>

        <div class="message" id="message"></div>

        <div class="board-wrap">
          <table class="board" id="boardTable" aria-label="猜测记录">
            <thead>
              <tr id="boardHead">
                <th class="player-cell">球员</th>
                <th>球队</th>
                <th>位置</th>
                <th>身高</th>
                <th>经验</th>
                <th>国家</th>
                <th>选秀</th>
              </tr>
            </thead>
            <tbody id="boardBody"></tbody>
          </table>
          <div class="empty" id="emptyState">
            <div><b>开始猜一个球员</b>颜色会提示每个维度和答案的距离。</div>
          </div>
        </div>
      </div>

      <aside class="side">
        <div class="mode-tabs" role="tablist" aria-label="难度模式">
          <button type="button" id="normalMode" class="active">普通</button>
          <button type="button" id="hardMode">困难</button>
        </div>

        <div class="panel-title">Answer</div>
        <div class="answer-card" id="answerCard">
          <div class="portrait" id="portrait"><div class="silhouette" aria-hidden="true"></div></div>
          <div class="answer-body">
            <h2 id="answerName">?</h2>
            <p id="answerMeta">命中或手动揭晓后显示。</p>
            <div class="quick-grid" id="answerStats">
              <div class="quick"><b>--</b><span>Team</span></div>
              <div class="quick"><b>--</b><span>Pos</span></div>
              <div class="quick"><b>--</b><span>Height</span></div>
            </div>
          </div>
        </div>

        <div class="legend-block" id="legendBlock">
          <div class="panel-title">Colors</div>
          <div class="legend" aria-label="颜色说明">
            <div class="green">命中</div>
            <div class="yellow">接近</div>
            <div class="red">偏离</div>
          </div>
        </div>

        <div class="actions">
          <button class="secondary" type="button" id="newRandomButton">新一局</button>
          <button class="secondary" type="button" id="shareButton">复制结果</button>
          <button class="secondary" type="button" id="resetButton">揭晓答案</button>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="modal-backdrop" id="winModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <h2 id="winTitle">猜中了</h2>
      <p id="winText"></p>
      <div class="modal-actions">
        <button class="primary" type="button" id="modalNewButton">新一局</button>
        <button class="secondary" type="button" id="modalCloseButton">查看结果</button>
      </div>
    </div>
  </div>

      hardMode: document.getElementById("hardMode"),
      legendBlock: document.getElementById("legendBlock"),
      winModal: document.getElementById("winModal"),
      winText: document.getElementById("winText"),
      modalNew: document.getElementById("modalNewButton"),
      modalClose: document.getElementById("modalCloseButton")
    };

    const state = {
      players: [],
      answer: null,
      guesses: [],
      finished: false,
      won: false,
      round: 0,
      difficulty: "normal",
      activeSuggestion: -1,
      selectedPlayer: null
    };

    init();

    function init() {
      state.players = JSON.parse(document.getElementById("players-data").textContent)
        .map(normalizePlayer)
        .filter(player => player.name && player.team && player.heightIn)
        .sort((a, b) => a.name.localeCompare(b.name));

      els.poolStat.textContent = state.players.length.toLocaleString();
      els.sourceLabel.innerHTML = `数据源：${DATA_SOURCE.label}<br>${DATA_SOURCE.season} · ${DATA_SOURCE.fetchedAt}`;
      bindEvents();
      startNewRound();
    }

    function bindEvents() {
      els.form.addEventListener("submit", event => {
        event.preventDefault();
        submitGuess();
      });

      els.input.addEventListener("input", () => {
        state.selectedPlayer = null;
        state.activeSuggestion = -1;
        renderSuggestions();
      });

      els.input.addEventListener("focus", renderSuggestions);
      els.input.addEventListener("keydown", handleSuggestionKeys);

      els.suggestions.addEventListener("mousedown", event => {
        const button = event.target.closest(".suggestion");
        if (!button) return;
        event.preventDefault();
        const player = findPlayerById(button.dataset.id);
        if (player) selectSuggestion(player);
      });

      document.addEventListener("mousedown", event => {
        if (!event.target.closest(".searchbox")) hideSuggestions();
      });

      els.clear.addEventListener("click", () => {
        els.input.value = "";
        state.selectedPlayer = null;
        hideSuggestions();
        els.input.focus();
      });

      els.newRandom.addEventListener("click", () => startNewRound());
      els.reset.addEventListener("click", revealAnswer);
      els.share.addEventListener("click", shareResult);
      els.normalMode.addEventListener("click", () => setDifficulty("normal"));
      els.hardMode.addEventListener("click", () => setDifficulty("hard"));
      els.modalNew.addEventListener("click", () => {
        closeWinModal();
        startNewRound();
      });
      els.modalClose.addEventListener("click", closeWinModal);
      els.winModal.addEventListener("mousedown", event => {
        if (event.target === els.winModal) closeWinModal();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && !els.winModal.hidden) closeWinModal();
      });
    }

    function normalizePlayer(player) {
      const heightCm = Math.round(Number(player.heightIn || 0) * 2.54);
      const posFine = finePosition(player.pos, Number(player.heightIn || 0));
      return {
        ...player,
        aliases: normalizeText(player.name),
        posFine,
        posRank: positionRank(posFine),
        heightCm,
        exp: Math.max(0, Number(DATA_SOURCE.season.slice(0, 4)) - Number(player.fromYear || DATA_SOURCE.season.slice(0, 4))),
        draftPickValue: Number.isFinite(Number(player.draftPick)) ? Number(player.draftPick) : 99
      };
    }

    function setDifficulty(mode) {
      if (state.difficulty === mode) return;
      state.difficulty = mode;
      closeWinModal();
      startNewRound();
    }

    function syncDifficultyUI() {
      const hard = state.difficulty === "hard";
      els.normalMode.classList.toggle("active", !hard);
      els.hardMode.classList.toggle("active", hard);
      els.legendBlock.hidden = hard;
      els.boardTable.classList.toggle("hard-board", hard);
    }

    function showWinModal() {
      els.winText.textContent = `${state.answer.name} · ${state.guesses.length} 次猜中`;
      els.winModal.hidden = false;
    }

    function closeWinModal() {
      els.winModal.hidden = true;
    }

    function headshotUrl(player) {
      return `https://cdn.nba.com/headshots/nba/latest/1040x760/${player.id}.png`;
    }

    function startNewRound() {
      state.round += 1;
      state.answer = state.players[Math.floor(Math.random() * state.players.length)];
      state.guesses = [];
      state.finished = false;
      state.won = false;
      state.selectedPlayer = null;
      state.activeSuggestion = -1;
      closeWinModal();
      syncDifficultyUI();
      els.input.value = "";
      hideSuggestions();
      renderAll();
      els.input.focus();
    }

    function revealAnswer() {
      state.finished = true;
      state.won = false;
      closeWinModal();
      hideSuggestions();
      renderAll();
      toast("答案已揭晓，可以开新一局");
    }

    function handleSuggestionKeys(event) {
      const options = Array.from(els.suggestions.querySelectorAll(".suggestion"));
      if (!options.length) return;

      if (event.key === "ArrowDown") {
        event.preventDefault();
        state.activeSuggestion = Math.min(options.length - 1, state.activeSuggestion + 1);
        syncActiveSuggestion(options);
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        state.activeSuggestion = Math.max(0, state.activeSuggestion - 1);
        syncActiveSuggestion(options);
      }

      if (event.key === "Enter" && state.activeSuggestion >= 0) {
        event.preventDefault();
        const player = findPlayerById(options[state.activeSuggestion].dataset.id);
        if (player) {
          selectSuggestion(player);
          submitGuess();
        }
      }

      if (event.key === "Escape") {
        hideSuggestions();
      }
    }

    function renderSuggestions() {
      const matches = getSuggestionMatches(els.input.value);
      els.input.setAttribute("aria-expanded", String(matches.length > 0));
      els.suggestions.hidden = matches.length === 0;
      state.activeSuggestion = matches.length ? Math.min(state.activeSuggestion, matches.length - 1) : -1;
      els.suggestions.innerHTML = matches.map((player, index) => `
        <button class="suggestion ${index === state.activeSuggestion ? "active" : ""}" type="button" role="option" data-id="${player.id}">
          <strong>${escapeHtml(player.name)}</strong>
          <span>${escapeHtml(player.team)} · ${escapeHtml(player.posFine)} · ${player.heightCm}cm</span>
        </button>
      `).join("");
    }

    function getSuggestionMatches(value) {
      const query = normalizeText(value);
      if (!query) return [];
      return state.players
        .map(player => ({ player, score: suggestionScore(player, query) }))
        .filter(item => item.score < 99)
        .sort((a, b) => a.score - b.score || a.player.name.localeCompare(b.player.name))
        .slice(0, MAX_SUGGESTIONS)
        .map(item => item.player);
    }

    function suggestionScore(player, query) {
      if (player.aliases === query) return 0;
      if (player.aliases.startsWith(query)) return 1;
      if (player.aliases.split(" ").some(part => part.startsWith(query))) return 2;
      if (player.team.toLowerCase() === query) return 3;
      if (player.aliases.includes(query)) return 4;
      return 99;
    }

    function syncActiveSuggestion(options) {
      options.forEach((option, index) => option.classList.toggle("active", index === state.activeSuggestion));
      options[state.activeSuggestion]?.scrollIntoView({ block: "nearest" });
    }

    function selectSuggestion(player) {
      state.selectedPlayer = player;
      els.input.value = player.name;
      hideSuggestions();
      els.input.focus();
    }

    function hideSuggestions() {
      els.suggestions.hidden = true;
      els.input.setAttribute("aria-expanded", "false");
      state.activeSuggestion = -1;
    }

    function findPlayerById(id) {
      return state.players.find(player => String(player.id) === String(id));
    }

    function findGuessPlayer() {
      if (state.selectedPlayer && state.selectedPlayer.name === els.input.value) return state.selectedPlayer;
      const value = normalizeText(els.input.value);
      if (!value) return null;
      const exact = state.players.find(item => item.aliases === value);
      if (exact) return exact;
      return getSuggestionMatches(els.input.value)[0] || null;
    }

    function submitGuess() {
      if (state.finished) {
        toast("这一局已经结束，点“新一局”继续");
        return;
      }

      const player = findGuessPlayer();
      if (!player) {
        toast("没有找到这个球员，先从下方候选里选一个");
        renderSuggestions();
        return;
      }

      if (state.guesses.some(item => item.id === player.id)) {
        toast("这个球员已经猜过了");
        els.input.select();
        return;
      }

      state.guesses.push(player);
      state.won = player.id === state.answer.id;
      state.finished = state.won;
      els.input.value = "";
      state.selectedPlayer = null;
      hideSuggestions();
      renderAll();
      if (state.won) showWinModal();
    }

    function renderAll() {
      syncDifficultyUI();
      renderBoard();
      renderStatus();
      renderAnswer();
      els.input.disabled = state.finished;
      els.guessButton.disabled = state.finished;
    }

    function renderStatus() {
      els.attemptStat.textContent = state.guesses.length;
      els.modeStat.textContent = `#${state.round}`;
      els.resultStat.textContent = state.finished ? (state.won ? "Win" : "Reveal") : "Playing";

      if (!state.guesses.length) {
        els.message.innerHTML = state.difficulty === "hard"
          ? `困难模式：只看轮廓猜球员，猜错不提供提示。`
          : `输入球员名，下方会显示候选；本局不限猜测次数。`;
        return;
      }

      if (state.won) {
        els.message.innerHTML = `<strong>命中！</strong>${state.answer.name} 就是答案。点“新一局”继续。`;
        return;
      }

      if (state.finished) {
        els.message.innerHTML = `<strong>答案揭晓：</strong>${state.answer.name}。`;
        return;
      }

      els.message.innerHTML = state.difficulty === "hard"
        ? `困难模式：已猜 <strong>${state.guesses.length}</strong> 次，继续看轮廓。`
        : `已猜 <strong>${state.guesses.length}</strong> 次，继续缩小球队、位置和数值范围。`;
    }

    function renderBoard() {
      els.empty.style.display = state.guesses.length ? "none" : "grid";
      els.board.replaceChildren();
      els.empty.querySelector("div").innerHTML = state.difficulty === "hard"
        ? `<b>看轮廓猜球员</b>猜错只记录名字，不给提示。`
        : `<b>开始猜一个球员</b>颜色会提示每个维度和答案的距离。`;
      const rows = [...state.guesses].reverse();
      const frag = document.createDocumentFragment();

      if (state.difficulty === "hard") {
        els.boardHead.innerHTML = `<th class="player-cell hard-guess-cell">已猜球员</th>`;
        rows.forEach(player => {
          const tr = document.createElement("tr");
          tr.className = "guess-row";
          tr.innerHTML = `<td class="player-cell hard-guess-cell">${escapeHtml(player.name)}</td>`;
          frag.appendChild(tr);
        });
        els.board.appendChild(frag);
        return;
      }

      els.boardHead.innerHTML = `
        <th class="player-cell">球员</th>
        <th>球队</th>
        <th>位置</th>
        <th>身高</th>
        <th>经验</th>
        <th>国家</th>
        <th>选秀</th>
      `;
      rows.forEach(player => {
        const tr = document.createElement("tr");
        tr.className = "guess-row";
        tr.innerHTML = `
          <td class="player-cell">${escapeHtml(player.name)}<span class="mini">${escapeHtml(player.team)} · #${escapeHtml(player.jersey || "--")}</span></td>
          ${tile(teamCheck(player), player.team)}
          ${tile(positionCheck(player), player.posFine)}
          ${tile(numberCheck(player.heightCm, state.answer.heightCm), `${player.heightCm}cm`)}
          ${tile(numberCheck(player.exp, state.answer.exp), `${player.exp} 年`)}
          ${tile(countryCheck(player), player.country)}
          ${tile(draftCheck(player), draftLabel(player))}
        `;
        frag.appendChild(tr);
      });
      els.board.appendChild(frag);
    }

    function renderAnswer() {
      const reveal = state.finished;
      const hardClue = state.difficulty === "hard" && !reveal;
      els.portrait.classList.toggle("hard-clue", hardClue);
      els.answerStats.hidden = hardClue;

      if (!reveal) {
        els.answerName.textContent = "?";
        els.answerMeta.textContent = hardClue ? "看轮廓猜球员。" : "命中或手动揭晓后显示。";
        els.portrait.innerHTML = hardClue
          ? `<img src="${headshotUrl(state.answer)}" alt="">`
          : `<div class="silhouette" aria-hidden="true"></div>`;
        els.answerStats.innerHTML = `
          <div class="quick"><b>--</b><span>Team</span></div>
          <div class="quick"><b>--</b><span>Pos</span></div>
          <div class="quick"><b>--</b><span>Height</span></div>
        `;
        return;
      }

      const a = state.answer;
      els.answerStats.hidden = false;
      els.answerName.textContent = a.name;
      els.answerMeta.textContent = `${a.teamCity} ${a.teamName} · ${a.country} · ${draftLabel(a)}`;
      els.portrait.innerHTML = `<img src="${headshotUrl(a)}" alt="${escapeAttr(a.name)}">`;
      els.answerStats.innerHTML = `
        <div class="quick"><b>${escapeHtml(a.team)}</b><span>Team</span></div>
        <div class="quick"><b>${escapeHtml(a.posFine)}</b><span>Pos</span></div>
        <div class="quick"><b>${a.heightCm}cm</b><span>Height</span></div>
      `;
    }

    function tile(result, label) {
      return `<td><div class="tile ${result.className}">${escapeHtml(label)}</div></td>`;
    }

    function teamCheck(player) {
      if (player.team === state.answer.team) return exact();
      const a = TEAM_META[player.team] || [];
      const b = TEAM_META[state.answer.team] || [];
      if (a[1] && a[1] === b[1]) return close("同分区");
      if (a[0] && a[0] === b[0]) return close("同联盟");
      return wrong();
    }

    function positionCheck(player) {
      if (player.posFine === state.answer.posFine) return exact();
      return Math.abs(player.posRank - state.answer.posRank) === 1 ? close() : wrong();
    }

    function countryCheck(player) {
      if (player.country === state.answer.country) return exact();
      const guessed = countryRegion(player.country);
      const answer = countryRegion(state.answer.country);
      return guessed && guessed === answer ? close(guessed) : wrong();
    }

    function draftCheck(player) {
      if (!player.draftYear && !state.answer.draftYear) return exact();
      if (player.draftPickValue === state.answer.draftPickValue) return exact();
      if (player.draftYear === state.answer.draftYear) return close("同届");
      if (Math.abs(player.draftPickValue - state.answer.draftPickValue) <= 10) {
        return close(player.draftPickValue < state.answer.draftPickValue ? "顺位更低" : "顺位更高");
      }
      return wrong(player.draftPickValue < state.answer.draftPickValue ? "顺位更低" : "顺位更高");
    }

    function numberCheck(value, target) {
      const delta = Number(value) - Number(target);
      if (Math.abs(delta) < .05) return exact();
      return delta < 0 ? close() : wrong();
    }

    function exact() {
      return { className: "green", hint: "" };
    }

    function close(hint) {
      return { className: "yellow", hint };
    }

    function wrong(hint = "") {
      return { className: "red", hint };
    }

    function finePosition(position, heightIn) {
      const pos = String(position || "").toUpperCase();
      const height = Number(heightIn || 0);
      if (pos === "C" || pos.startsWith("C-")) return "C";
      if (pos === "F-C") return height >= 83 ? "C" : "PF";
      if (pos === "F") return height >= 80 ? "PF" : "SF";
      if (pos === "F-G") return height <= 76 ? "SG" : "SF";
      if (pos === "G-F") return height >= 78 ? "SF" : "SG";
      if (pos === "G") return height <= 75 ? "PG" : "SG";
      if (pos.includes("C")) return height >= 83 ? "C" : "PF";
      if (pos.includes("F")) return height >= 80 ? "PF" : "SF";
      return "SG";
    }

    function positionRank(position) {
      return { PG: 1, SG: 2, SF: 3, PF: 4, C: 5 }[position] || 3;
    }

    function draftLabel(player) {
      if (!player.draftYear) return "落选秀";
      return `${player.draftYear} #${player.draftPick || "--"}`;
    }

    function countryRegion(country) {
      if (!country) return "";
      if (COUNTRY_REGION[country]) return COUNTRY_REGION[country];
      const key = Object.keys(COUNTRY_REGION).find(item => country.includes(item));
      return key ? COUNTRY_REGION[key] : "Other";
    }

    async function shareResult() {
      const hard = state.difficulty === "hard";
      const squares = hard
        ? state.guesses.map((player, index) => `${index + 1}. ${player.name}`).join("\n")
        : state.guesses.map(player => {
          const cells = [
            teamCheck(player), positionCheck(player),
            numberCheck(player.heightCm, state.answer.heightCm),
            numberCheck(player.exp, state.answer.exp),
            countryCheck(player), draftCheck(player)
          ];
          return cells.map(cell => cell.className === "green" ? "G" : cell.className === "yellow" ? "Y" : "R").join("");
        }).join("\n");
      const status = state.won ? "Win" : state.finished ? "Reveal" : "Playing";
      const modeName = hard ? "Hard" : "Normal";
      const text = `NBA Guess Player ${modeName} round ${state.round} · ${status} · ${state.guesses.length} guesses\n${squares || "还没开始"}\n${DATA_SOURCE.label}`;
      try {
        await navigator.clipboard.writeText(text);
        toast("结果已复制");
      } catch {
        toast("浏览器不允许复制，可以手动选中结果");
      }
    }

    function toast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
