<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VCT CN Guess Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b10;
      --panel: #111722;
      --panel-2: #171e2b;
      --line: #273246;
      --text: #f4f7fb;
      --muted: #93a0b6;
      --red: #ff4655;
      --cyan: #19d3c5;
      --green: #18a66a;
      --yellow: #dca21c;
      --bad: #a52c3c;
      --shadow: 0 18px 48px rgba(0, 0, 0, .34);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255, 70, 85, .16), transparent 34%),
        linear-gradient(225deg, rgba(25, 211, 197, .11), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    button, input { font: inherit; }

    .app {
      width: min(100vw - 28px, 1220px);
      margin: 0 auto;
      padding: 26px 0 38px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      gap: 13px;
      align-items: center;
    }

    .mark {
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--red), #781624);
      box-shadow: var(--shadow);
      font-weight: 950;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.4rem);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .source {
      text-align: right;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.45;
    }

    .source a { color: #80fff2; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      align-items: start;
    }

    .surface, .side {
      background: linear-gradient(180deg, rgba(255, 255, 255, .045), rgba(255, 255, 255, .02)), var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .surface { padding: 16px; overflow: hidden; }
    .side { padding: 14px; }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      border: 1px solid #2b364a;
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
      min-height: 64px;
    }

    .stat b {
      display: block;
      font-size: 1.3rem;
      line-height: 1.05;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: .72rem;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 9px;
      align-items: start;
    }

    .searchbox { position: relative; }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid #33405a;
      border-radius: 8px;
      padding: 0 13px;
      color: var(--text);
      background: #0c111a;
      outline: none;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(25, 211, 197, .16);
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 850;
      color: var(--text);
      white-space: nowrap;
    }

    .primary { background: var(--red); padding: 0 18px; }
    .secondary { background: #232c3d; padding: 0 14px; border: 1px solid #354158; }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .suggestions {
      position: absolute;
      top: calc(100% + 7px);
      left: 0;
      right: 0;
      z-index: 20;
      max-height: 330px;
      overflow: auto;
      border: 1px solid #34425b;
      border-radius: 8px;
      background: #0c111a;
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .suggestion {
      width: 100%;
      min-height: 46px;
      height: auto;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 7px;
    }

    .suggestion:hover, .suggestion.active { background: #182132; }
    .suggestion small { color: var(--muted); font-weight: 700; }

    .message {
      min-height: 42px;
      margin: 12px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .board-wrap {
      position: relative;
      overflow-x: auto;
      border: 1px solid #2b364a;
      border-radius: 8px;
      background: #0c111a;
    }

    .board {
      width: 100%;
      min-width: 850px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th {
      height: 40px;
      padding: 0 10px;
      color: #cad3e4;
      text-align: left;
      font-size: .8rem;
      border-bottom: 1px solid #273246;
      background: #111722;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: 0; }

    .player-cell {
      width: 190px;
      font-weight: 920;
      color: #fff;
    }

    .mini {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 780;
    }

    .tile {
      min-height: 46px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 6px 8px;
      text-align: center;
      color: #fff;
      font-size: .9rem;
      font-weight: 920;
      line-height: 1.05;
      white-space: nowrap;
    }

    .green { background: var(--green); }
    .yellow { background: var(--yellow); }
    .red { background: var(--bad); }

    .empty {
      position: absolute;
      inset: 40px 0 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 20px;
      pointer-events: none;
    }

    .empty b {
      display: block;
      color: var(--text);
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .panel-title {
      color: #cad3e4;
      font-weight: 900;
      margin: 0 0 10px;
      letter-spacing: .02em;
    }

    .answer-card {
      overflow: hidden;
      border: 1px solid #2b364a;
      border-radius: 8px;
      background: #0c111a;
    }

    .portrait {
      height: 192px;
      background:
        linear-gradient(135deg, rgba(255, 70, 85, .28), rgba(25, 211, 197, .14)),
        #131a26;
      display: grid;
      place-items: end center;
      overflow: hidden;
    }

    .portrait img {
      max-width: 100%;
      max-height: 210px;
      object-fit: contain;
      filter: drop-shadow(0 16px 22px rgba(0, 0, 0, .34));
    }

    .silhouette {
      width: 114px;
      height: 142px;
      border-radius: 55px 55px 18px 18px;
      background: linear-gradient(180deg, #2c3547, #111722);
      transform: translateY(14px);
    }

    .answer-body { padding: 14px; }
    .answer-body h2 { margin: 0; font-size: 1.35rem; line-height: 1.1; }
    .answer-body p { margin: 7px 0 0; color: var(--muted); line-height: 1.35; font-size: .92rem; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .quick {
      border: 1px solid #2b364a;
      border-radius: 8px;
      padding: 9px;
      background: #111722;
    }

    .quick b { display: block; font-size: 1rem; line-height: 1.1; }
    .quick span { display: block; margin-top: 4px; color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; }

    .legend {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .legend div {
      min-height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 6px;
      color: #fff;
      font-size: .78rem;
      font-weight: 880;
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .actions .secondary { width: 100%; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #101827;
      color: #fff;
      padding: 11px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 30;
      max-width: min(460px, calc(100vw - 24px));
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, .54);
      z-index: 40;
    }

    .modal-backdrop[hidden] { display: none; }

    .modal {
      width: min(360px, 100%);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .16);
      background: #101722;
      box-shadow: var(--shadow);
      padding: 20px;
      text-align: center;
    }

    .modal h2 { margin: 0; font-size: 1.6rem; }
    .modal p { margin: 8px 0 16px; color: var(--muted); }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .source { text-align: left; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 640px) {
      .app { width: min(100vw - 18px, 1220px); padding-top: 14px; }
      .controls { grid-template-columns: 1fr 74px 74px; }
      .status-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tile { min-height: 42px; font-size: .82rem; }
      .player-cell { width: 160px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">VCT</div>
        <div>
          <h1>2026 VCT CN 第一赛段猜队员</h1>
          <p class="subtitle">队伍、年龄、位置、ACS、季后赛、生涯队伍数。</p>
        </div>
      </div>
      <div class="source" id="sourceLabel">
        数据：<a href="https://vct.qq.com/" target="_blank" rel="noreferrer">vct.qq.com</a> / TJStats 官方接口<br>
        位置由本赛段英雄使用推断，生涯队伍数按公开资料补齐
      </div>
    </header>

    <section class="layout">
      <div class="surface">
        <div class="status-strip">
          <div class="stat"><b id="attemptStat">0</b><span>Guesses</span></div>
          <div class="stat"><b id="roundStat">#1</b><span>Round</span></div>
          <div class="stat"><b id="poolStat">0</b><span>Players</span></div>
          <div class="stat"><b id="resultStat">Ready</b><span>Status</span></div>
        </div>

        <form class="controls" id="guessForm" autocomplete="off">
          <div class="searchbox">
            <input id="guessInput" placeholder="输入 VCT CN 选手 ID 或中文名" aria-label="输入 VCT CN 选手 ID 或中文名" aria-controls="suggestions" aria-expanded="false">
            <div class="suggestions" id="suggestions" role="listbox" hidden></div>
          </div>
          <button class="primary" type="submit" id="guessButton">猜</button>
          <button class="secondary" type="button" id="clearButton">清空</button>
        </form>

        <div class="message" id="message"></div>

        <div class="board-wrap">
          <table class="board" aria-label="猜测记录">
            <thead>
              <tr>
                <th class="player-cell">选手</th>
                <th>队伍</th>
                <th>年龄</th>
                <th>位置</th>
                <th>ACS</th>
                <th>季后赛</th>
                <th>生涯队伍数</th>
              </tr>
            </thead>
            <tbody id="boardBody"></tbody>
          </table>
          <div class="empty" id="emptyState">
            <div><b>开始猜一个队员</b>数字项用颜色提示答案更高或更低。</div>
          </div>
        </div>
      </div>

      <aside class="side">
        <div class="panel-title">Answer</div>
        <div class="answer-card">
          <div class="portrait" id="portrait"><div class="silhouette" aria-hidden="true"></div></div>
          <div class="answer-body">
            <h2 id="answerName">?</h2>
            <p id="answerMeta">命中或手动揭晓后显示。</p>
            <div class="quick-grid" id="answerStats">
              <div class="quick"><b>--</b><span>Team</span></div>
              <div class="quick"><b>--</b><span>Role</span></div>
              <div class="quick"><b>--</b><span>ACS</span></div>
            </div>
          </div>
        </div>

        <div class="legend">
          <div class="green">绿色：命中</div>
          <div class="yellow">数字项：答案更高</div>
          <div class="red">红色：不符 / 数字项答案更低</div>
        </div>

        <div class="actions">
          <button class="secondary" type="button" id="newRoundButton">新一局</button>
          <button class="secondary" type="button" id="shareButton">复制结果</button>
          <button class="secondary" type="button" id="revealButton">揭晓答案</button>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="modal-backdrop" id="winModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <h2 id="winTitle">猜中了</h2>
      <p id="winText"></p>
      <div class="modal-actions">
        <button class="primary" type="button" id="modalNewButton">新一局</button>
        <button class="secondary" type="button" id="modalCloseButton">查看结果</button>
      </div>
    </div>
  </div>

  <script>
    const MAX_SUGGESTIONS = 9;
    const DATA_SOURCE = {
      label: "2026 VCT CN Stage 1",
      fetchedAt: "2026-05-24 23:20",
      eventId: "1000060"
    };

    const els = {
      input: document.getElementById("guessInput"),
      suggestions: document.getElementById("suggestions"),
      form: document.getElementById("guessForm"),
      clear: document.getElementById("clearButton"),
      board: document.getElementById("boardBody"),
      empty: document.getElementById("emptyState"),
      message: document.getElementById("message"),
      attemptStat: document.getElementById("attemptStat"),
      roundStat: document.getElementById("roundStat"),
      poolStat: document.getElementById("poolStat"),
      resultStat: document.getElementById("resultStat"),
      answerName: document.getElementById("answerName"),
      answerMeta: document.getElementById("answerMeta"),
      answerStats: document.getElementById("answerStats"),
      portrait: document.getElementById("portrait"),
      newRound: document.getElementById("newRoundButton"),
      share: document.getElementById("shareButton"),
      reveal: document.getElementById("revealButton"),
      toast: document.getElementById("toast"),
      guessButton: document.getElementById("guessButton"),
      winModal: document.getElementById("winModal"),
      winText: document.getElementById("winText"),
      modalNew: document.getElementById("modalNewButton"),
      modalClose: document.getElementById("modalCloseButton")
    };

    const state = {
      players: [],
      answer: null,
      guesses: [],
      finished: false,
      won: false,
      round: 0,
      activeSuggestion: -1,
      selectedPlayer: null
    };

    init();

    function init() {
      state.players = JSON.parse(document.getElementById("players-data").textContent)
        .map(normalizePlayer)
        .sort((a, b) => a.name.localeCompare(b.name));
      els.poolStat.textContent = state.players.length;
      bindEvents();
      startNewRound();
    }

    function bindEvents() {
      els.form.addEventListener("submit", event => {
        event.preventDefault();
        submitGuess();
      });
      els.input.addEventListener("input", () => {
        state.selectedPlayer = null;
        state.activeSuggestion = -1;
        renderSuggestions();
      });
      els.input.addEventListener("focus", renderSuggestions);
      els.input.addEventListener("keydown", handleSuggestionKeys);
      els.suggestions.addEventListener("mousedown", event => {
        const button = event.target.closest(".suggestion");
        if (!button) return;
        event.preventDefault();
        const player = findPlayerById(button.dataset.id);
        if (player) selectSuggestion(player);
      });
      document.addEventListener("mousedown", event => {
        if (!event.target.closest(".searchbox")) hideSuggestions();
      });
      els.clear.addEventListener("click", () => {
        els.input.value = "";
        state.selectedPlayer = null;
        hideSuggestions();
        els.input.focus();
      });
      els.newRound.addEventListener("click", startNewRound);
      els.reveal.addEventListener("click", revealAnswer);
      els.share.addEventListener("click", shareResult);
      els.modalNew.addEventListener("click", () => {
        closeWinModal();
        startNewRound();
      });
      els.modalClose.addEventListener("click", closeWinModal);
      els.winModal.addEventListener("mousedown", event => {
        if (event.target === els.winModal) closeWinModal();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && !els.winModal.hidden) closeWinModal();
      });
    }

    function normalizePlayer(player) {
      return {
        ...player,
        aliases: normalizeText(`${player.name} ${player.cn} ${player.team} ${player.id === "taojibo" ? "taojibo tao ji bo" : ""}`)
      };
    }

    function startNewRound() {
      state.round += 1;
      state.answer = state.players[Math.floor(Math.random() * state.players.length)];
      state.guesses = [];
      state.finished = false;
      state.won = false;
      state.selectedPlayer = null;
      state.activeSuggestion = -1;
      els.input.value = "";
      closeWinModal();
      hideSuggestions();
      renderAll();
      els.input.focus();
    }

    function revealAnswer() {
      state.finished = true;
      state.won = false;
      closeWinModal();
      hideSuggestions();
      renderAll();
      toast("答案已揭晓，可以开新一局");
    }

    function handleSuggestionKeys(event) {
      const options = Array.from(els.suggestions.querySelectorAll(".suggestion"));
      if (!options.length) return;
      if (event.key === "ArrowDown") {
        event.preventDefault();
        state.activeSuggestion = Math.min(options.length - 1, state.activeSuggestion + 1);
        syncActiveSuggestion(options);
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        state.activeSuggestion = Math.max(0, state.activeSuggestion - 1);
        syncActiveSuggestion(options);
      }
      if (event.key === "Enter" && state.activeSuggestion >= 0) {
        event.preventDefault();
        const player = findPlayerById(options[state.activeSuggestion].dataset.id);
        if (player) {
          selectSuggestion(player);
          submitGuess();
        }
      }
      if (event.key === "Escape") hideSuggestions();
    }

    function syncActiveSuggestion(options) {
      options.forEach((option, index) => {
        option.classList.toggle("active", index === state.activeSuggestion);
        option.setAttribute("aria-selected", String(index === state.activeSuggestion));
      });
    }

    function renderSuggestions() {
      if (state.finished) return hideSuggestions();
      const matches = getSuggestionMatches(els.input.value);
      els.input.setAttribute("aria-expanded", String(matches.length > 0));
      els.suggestions.hidden = matches.length === 0;
      state.activeSuggestion = matches.length ? Math.min(state.activeSuggestion, matches.length - 1) : -1;
      els.suggestions.innerHTML = matches.map((player, index) => `
        <button class="suggestion ${index === state.activeSuggestion ? "active" : ""}" type="button" role="option" data-id="${escapeAttr(player.id)}">
          <span>${escapeHtml(player.name)} <small>${escapeHtml(player.cn || "")}</small></span>
          <small>${escapeHtml(player.team)} · ${escapeHtml(player.role)}</small>
        </button>
      `).join("");
    }

    function getSuggestionMatches(value) {
      const query = normalizeText(value);
      const pool = state.players.filter(player => !state.guesses.some(guess => guess.id === player.id));
      if (!query) return pool.slice(0, MAX_SUGGESTIONS);
      return pool
        .map(player => ({ player, score: matchScore(player, query) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.player.name.localeCompare(b.player.name))
        .slice(0, MAX_SUGGESTIONS)
        .map(item => item.player);
    }

    function matchScore(player, query) {
      if (player.aliases === query) return 100;
      if (player.aliases.startsWith(query)) return 80;
      if (player.aliases.includes(query)) return 50;
      return 0;
    }

    function selectSuggestion(player) {
      state.selectedPlayer = player;
      els.input.value = player.name;
      hideSuggestions();
    }

    function hideSuggestions() {
      els.suggestions.hidden = true;
      els.suggestions.innerHTML = "";
      els.input.setAttribute("aria-expanded", "false");
      state.activeSuggestion = -1;
    }

    function findPlayerById(id) {
      return state.players.find(player => String(player.id) === String(id));
    }

    function findGuessPlayer() {
      if (state.selectedPlayer) return state.selectedPlayer;
      const value = normalizeText(els.input.value);
      if (!value) return null;
      const exact = state.players.find(player => normalizeText(player.name) === value || normalizeText(player.cn) === value);
      if (exact) return exact;
      return getSuggestionMatches(els.input.value)[0] || null;
    }

    function submitGuess() {
      if (state.finished) {
        toast("这一局已经结束，点“新一局”继续");
        return;
      }
      const player = findGuessPlayer();
      if (!player) {
        toast("没有找到这个选手，先从候选里选一个");
        renderSuggestions();
        return;
      }
      if (state.guesses.some(item => item.id === player.id)) {
        toast("这个选手已经猜过了");
        els.input.select();
        return;
      }
      state.guesses.push(player);
      state.won = player.id === state.answer.id;
      state.finished = state.won;
      els.input.value = "";
      state.selectedPlayer = null;
      hideSuggestions();
      renderAll();
      if (state.won) showWinModal();
    }

    function renderAll() {
      renderBoard();
      renderStatus();
      renderAnswer();
      els.input.disabled = state.finished;
      els.guessButton.disabled = state.finished;
    }

    function renderStatus() {
      els.attemptStat.textContent = state.guesses.length;
      els.roundStat.textContent = `#${state.round}`;
      els.resultStat.textContent = state.finished ? (state.won ? "Win" : "Reveal") : "Playing";
      if (!state.guesses.length) {
        els.message.innerHTML = `输入选手 ID 或中文名，下方会显示候选；本局不限猜测次数。`;
        return;
      }
      if (state.won) {
        els.message.innerHTML = `<strong>命中！</strong>${escapeHtml(state.answer.name)} 就是答案。`;
        return;
      }
      if (state.finished) {
        els.message.innerHTML = `<strong>答案揭晓：</strong>${escapeHtml(state.answer.name)}。`;
        return;
      }
      els.message.innerHTML = `已猜 <strong>${state.guesses.length}</strong> 次，继续缩小队伍、年龄、位置和 ACS 范围。`;
    }

    function renderBoard() {
      els.empty.style.display = state.guesses.length ? "none" : "grid";
      els.board.replaceChildren();
      const rows = [...state.guesses].reverse();
      const frag = document.createDocumentFragment();
      rows.forEach(player => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="player-cell">${escapeHtml(player.name)}<span class="mini">${escapeHtml(player.cn || "")}</span></td>
          ${tile(categoryCheck(player.team, state.answer.team), player.team)}
          ${tile(numberCheck(player.age, state.answer.age), `${player.age}岁`)}
          ${tile(categoryCheck(player.role, state.answer.role), player.role)}
          ${tile(numberCheck(player.acs, state.answer.acs), player.acs)}
          ${tile(categoryCheck(player.playoffs, state.answer.playoffs), player.playoffs ? "进" : "否")}
          ${tile(numberCheck(player.careerTeams, state.answer.careerTeams), player.careerTeams)}
        `;
        frag.appendChild(tr);
      });
      els.board.appendChild(frag);
    }

    function renderAnswer() {
      const reveal = state.finished;
      if (!reveal) {
        els.answerName.textContent = "?";
        els.answerMeta.textContent = "命中或手动揭晓后显示。";
        els.portrait.innerHTML = `<div class="silhouette" aria-hidden="true"></div>`;
        els.answerStats.innerHTML = `
          <div class="quick"><b>--</b><span>Team</span></div>
          <div class="quick"><b>--</b><span>Role</span></div>
          <div class="quick"><b>--</b><span>ACS</span></div>
        `;
        return;
      }
      const answer = state.answer;
      els.answerName.textContent = answer.name;
      els.answerMeta.textContent = `${answer.cn || "选手"} · ${answer.team} · ${answer.age}岁 · ${answer.playoffs ? "进入季后赛" : "未进季后赛"}`;
      els.portrait.innerHTML = `<img src="${escapeAttr(answer.photo)}" alt="${escapeAttr(answer.name)}">`;
      els.answerStats.innerHTML = `
        <div class="quick"><b>${escapeHtml(answer.team)}</b><span>Team</span></div>
        <div class="quick"><b>${escapeHtml(answer.role)}</b><span>Role</span></div>
        <div class="quick"><b>${answer.acs}</b><span>ACS</span></div>
      `;
    }

    function tile(result, label) {
      return `<td><div class="tile ${result.className}">${escapeHtml(label)}</div></td>`;
    }

    function categoryCheck(value, target) {
      return value === target ? exact() : wrong();
    }

    function numberCheck(value, target) {
      const delta = Number(value) - Number(target);
      if (Math.abs(delta) < .05) return exact();
      return delta < 0 ? close() : wrong();
    }

    function exact() { return { className: "green" }; }
    function close() { return { className: "yellow" }; }
    function wrong() { return { className: "red" }; }

    function showWinModal() {
      els.winText.textContent = `${state.answer.name} · ${state.guesses.length} 次猜中`;
      els.winModal.hidden = false;
    }

    function closeWinModal() {
      els.winModal.hidden = true;
    }

    async function shareResult() {
      const rows = state.guesses.map(player => {
        const cells = [
          categoryCheck(player.team, state.answer.team),
          numberCheck(player.age, state.answer.age),
          categoryCheck(player.role, state.answer.role),
          numberCheck(player.acs, state.answer.acs),
          categoryCheck(player.playoffs, state.answer.playoffs),
          numberCheck(player.careerTeams, state.answer.careerTeams)
        ];
        return cells.map(cell => cell.className === "green" ? "G" : cell.className === "yellow" ? "Y" : "R").join("");
      }).join("\n");
      const status = state.won ? "Win" : state.finished ? "Reveal" : "Playing";
      const text = `VCT CN Guess Player round ${state.round} · ${status} · ${state.guesses.length} guesses\n${rows || "还没开始"}\n${DATA_SOURCE.label}`;
      try {
        await navigator.clipboard.writeText(text);
        toast("结果已复制");
      } catch {
        toast("浏览器不允许复制，可以手动选中结果");
      }
    }

    function toast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
